version: "3.8"

services:

  mysql:
    image: mysql:8
    container_name: employee_management-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root@123
      MYSQL_DATABASE: employee_management_db
    ports:
      - "3306:3306"
    networks:
      - employee-network
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    image: employee-management-backend
    container_name: employee-management-backend
    restart: always
    depends_on:
      - mysql
    ports:
      - "8080:8085"
    networks:
      - employee-network
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/employee_management_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root@123

networks:
  employee-network:
    driver: bridge

volumes:
  mysql-data: